# Nginx configuration for React Micro-frontends with Module Federation

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Upstream for backend API
    upstream engine_backend {
        server engine:8080;
    }

    # ============================================
    # Main Application Server - Port 3000
    # ============================================
    server {
        listen 3000;
        server_name localhost;
        
        # ============================================
        # SECURITY HEADERS
        # ============================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # ============================================
        # CORS HEADERS
        # ============================================
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;

        # ============================================
        # API PROXY - Backend (Важно: до static файлов!)
        # ============================================
        location /api/ {
            proxy_pass http://engine_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ============================================
        # WEBSOCKET PROXY
        # ============================================
        location /ws {
            proxy_pass http://engine_backend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # ============================================
        # SSE PROXY
        # ============================================
        location /sse/ {
            proxy_pass http://engine_backend/sse/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }

        # ============================================
        # MODULE FEDERATION - Remote Entries
        # Важно: эти location должны быть ДО более общих!
        # ============================================
        
        # Modeler assets
        location /modeler/assets/ {
            alias /usr/share/nginx/html/modeler/assets/;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri $uri/ =404;
        }
        
        # Tasklist assets  
        location /tasklist/assets/ {
            alias /usr/share/nginx/html/tasklist/assets/;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri $uri/ =404;
        }
        
        # Monitor assets
        location /monitor/assets/ {
            alias /usr/share/nginx/html/monitor/assets/;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri $uri/ =404;
        }

        # ============================================
        # STATIC FILES - Micro-frontends
        # ============================================
        
        # Modeler root
        location = /modeler {
            return 301 /modeler/;
        }
        
        location /modeler/ {
            alias /usr/share/nginx/html/modeler/;
            index index.html;
            try_files $uri $uri/ /modeler/index.html;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
        }
        
        # Tasklist root
        location = /tasklist {
            return 301 /tasklist/;
        }
        
        location /tasklist/ {
            alias /usr/share/nginx/html/tasklist/;
            index index.html;
            try_files $uri $uri/ /tasklist/index.html;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
        }
        
        # Monitor root
        location = /monitor {
            return 301 /monitor/;
        }
        
        location /monitor/ {
            alias /usr/share/nginx/html/monitor/;
            index index.html;
            try_files $uri $uri/ /monitor/index.html;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
        }

        # ============================================
        # SHELL (Host) - Main Application
        # Должен быть ПОСЛЕДНИМ - ловит всё остальное
        # ============================================
        location / {
            root /usr/share/nginx/html/shell;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }
    }

    # ============================================
    # Modeler - Port 3001 (для development)
    # ============================================
    server {
        listen 3001;
        server_name localhost;
        
        location / {
            root /usr/share/nginx/html/modeler;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Access-Control-Allow-Origin "*";
        }
    }

    # ============================================
    # Tasklist - Port 3002 (для development)
    # ============================================
    server {
        listen 3002;
        server_name localhost;
        
        location / {
            root /usr/share/nginx/html/tasklist;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Access-Control-Allow-Origin "*";
        }
    }

    # ============================================
    # Monitor - Port 3003 (для development)
    # ============================================
    server {
        listen 3003;
        server_name localhost;
        
        location / {
            root /usr/share/nginx/html/monitor;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Access-Control-Allow-Origin "*";
        }
    }
}
