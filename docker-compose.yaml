# BPMN Workflow Platform - Docker Compose
# Main orchestration file

services:
  # =============================================================================
  # Infrastructure
  # =============================================================================

  # PostgreSQL Database
  postgres:
    build:
      context: ./infrastructure/postgres
      dockerfile: Dockerfile
    container_name: bpmn-postgres
    environment:
      POSTGRES_USER: bpmn
      POSTGRES_PASSWORD: bpmn_secret
      POSTGRES_DB: bpmn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
      - ./infrastructure/postgres/migrations:/migrations
    networks:
      - bpmn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpmn"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS Message Broker
  nats:
    build:
      context: ./infrastructure/nats
      dockerfile: Dockerfile
    container_name: bpmn-nats
    ports:
      - "4222:4222"
      - "6222:6222"
      - "8222:8222"
    volumes:
      - ./infrastructure/nats/nats.conf:/nats/nats.conf
      - ./infrastructure/nats/streams.json:/nats/streams.json
    networks:
      - bpmn-network
    command: ["-c", "/nats/nats.conf"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./infrastructure/nginx
      dockerfile: Dockerfile
    container_name: bpmn-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      engine:
        condition: service_started
      web:
        condition: service_started
    networks:
      - bpmn-network

  # =============================================================================
  # Application Services
  # =============================================================================

  # BPMN Workflow Engine (Go Backend)
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: bpmn-engine
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: bpmn
      DB_PASSWORD: bpmn_secret
      DB_NAME: bpmn
      DB_SSLMODE: disable
      NATS_URL: nats://nats:4222
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - bpmn-network
    restart: unless-stopped

  # Web Frontend (React Micro-frontends)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: bpmn-web
    environment:
      REACT_APP_API_URL: http://localhost/api
      REACT_APP_WS_URL: ws://localhost/ws
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
    depends_on:
      - engine
    networks:
      - bpmn-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/shell/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

# =============================================================================
# Networks
# =============================================================================
networks:
  bpmn-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
