name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'platform-workflow/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'platform-workflow/**'

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

jobs:
  # 1. Lint and Format Check
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-workflow/engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: platform-workflow/engine
          args: --timeout=5m

  # 2. Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-workflow/engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: |
          go test -v -race -coverprofile=coverage.out ./internal/core/... ./internal/service/...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./platform-workflow/engine/coverage.out
          flags: unittests
          name: unit-tests-coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v3
        with:
          name: unit-test-coverage
          path: platform-workflow/engine/coverage.out

  # 3. Integration Tests with Testcontainers
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-workflow/engine
    services:
      docker:
        image: docker:20.10.7-dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: |
          go test -v -tags=integration -timeout=20m ./tests/integration/...

  # 4. Build Docker Images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    strategy:
      matrix:
        service: [engine]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: platform-workflow/${{ matrix.service }}
          file: platform-workflow/${{ matrix.service }}/Dockerfile
          push: false
          tags: workflow-engine/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 5. Load Tests with k6
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    services:
      engine:
        image: workflow-engine/engine:${{ github.sha }}
        ports:
          - 8080:8080
        options: --health-cmd="curl -f http://localhost:8080/health || exit 1" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Wait for services
        run: |
          sleep 10
          curl -f http://localhost:8080/health || exit 1

      - name: Run smoke tests
        run: |
          k6 run --env SCENARIO=smoke --env BASE_URL=http://localhost:8080 platform-workflow/tests/load/start_instance.js

      - name: Run load tests
        run: |
          k6 run --env BASE_URL=http://localhost:8080 platform-workflow/tests/load/start_instance.js

      - name: Upload k6 reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: k6-reports
          path: reports/

  # 6. Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'platform-workflow/engine'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # 7. Performance Thresholds Check
  performance-check:
    name: Performance Thresholds
    runs-on: ubuntu-latest
    needs: [load-tests]
    if: failure()
    steps:
      - name: Notify on performance degradation
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Performance Thresholds Exceeded**\n\nThe load tests have failed. Please review the performance metrics and optimize the code.'
            })

  # 8. Final Status
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, build, security-scan]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.integration-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ CI passed"
