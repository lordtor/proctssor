# GitLab Service Configuration

server:
  host: "0.0.0.0"
  port: 8081

nats:
  url: "nats://localhost:4222"
  timeout: 30
  subscriber:
    subject_prefix: "wf.cmd.service.gitlab-service"
    queue_group: "gitlab-service"

gitlab:
  url: "https://gitlab.com"
  token: ""
  token_file: ""
  verify_tls: true

registry:
  engine_url: "http://engine:8080"
  heartbeat_interval: "30s"
  timeout: "10s"

service:
  name: "gitlab-service"
  type: "external"
  endpoint: "http://gitlab-service:8081"
  metadata:
    description: "GitLab integration service for workflow automation"
    version: "1.0.0"
