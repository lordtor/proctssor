# NATS Configuration for BPMN Workflow Platform

# Listen on port 4222 for client connections
listen: 0.0.0.0:4222

# Monitoring ports
http: 0.0.0.0:8222

# Enable JetStream for message streaming
jetstream {
    store_dir: /data/jetstream
    max_memory_store: 1GB
    max_file_store: 10GB
}

# Authorization
authorization {
    default_permissions = {
        publish = ["wf.>", "workflow.>"]
        subscribe = ["wf.>", "workflow.>"]
    }
}

# Connection settings
max_connections = 1000
max_payload = 8MB
max_pending = 64MB

# Write opts
write_deadline: "10s"

# Cluster (for future HA)
# cluster {
